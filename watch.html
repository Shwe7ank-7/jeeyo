<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JioTV Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }
    .channel-info {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
      padding: 1rem;
      display: flex;
      align-items: center;
      z-index: 10;
      transition: opacity 0.3s ease;
    }
    .channel-info.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .channel-logo {
      width: 40px;
      height: 40px;
      margin-right: 15px;
      border-radius: 8px;
      background: #222;
    }
    .channel-name {
      font-size: 1.2rem;
      font-weight: 500;
      color: white;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.2rem;
      text-align: center;
      z-index: 5;
    }
    .error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff4444;
      font-size: 1.2rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 2rem;
      border-radius: 8px;
      max-width: 80%;
    }
    .error.hidden {
      display: none;
    }

    /* Telegram Popup Styles */
    .popup-container {
        display: none; /* Hidden by default */
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.7);
        justify-content: center;
        align-items: center;
    }

    .popup-content {
        position: relative;
        background-color: #fff;
        padding: 20px;
        border-radius: 15px;
        max-width: 400px;
        text-align: center;
        position: relative;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        margin: 0 20px; /* Slight margin for mobile */
    }

    .popup-poster {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 15px;
    }

    .close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 28px;
    font-weight: bold;
    color: #000;
    background: #fff;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 9999;   /* Very important */
    }

    .join-btn {
        display: inline-block;
        background-color: #0088cc;
        color: white;
        padding: 10px 25px;
        text-decoration: none;
        border-radius: 25px;
        font-weight: bold;
        margin-top: 10px;
        transition: background 0.3s;
    }

    .join-btn:hover {
        background-color: #006699;
    }
  </style>
</head>
<body>
  <div class="channel-info hidden" id="channelInfo">
    <img class="channel-logo" id="channelLogo" src="" alt="Channel Logo" onerror="this.style.display='none'">
    <div class="channel-name" id="channelName">Loading Channel...</div>
  </div>
  
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata" poster="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwMCIgaGVpZ2h0PSI2MDAiIHZpZXdCb3g9IjAgMCAxMjAwIDYwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMjIyIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIyNCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkppb1RWIFBsYXllcjwvdGV4dD48L3N2Zz4="></video>
  </div>
  
  <div class="loading" id="loadingMessage">Loading player and channel data...</div>
  <div class="error hidden" id="errorMessage">
    <h2>Error Loading Channel</h2>
    <p id="errorText"></p>
  </div>

  <div id="telegram-popup" class="popup-container">
    <div class="popup-content">
        <span class="close-btn" onclick="closePopup()">&times;</span>
        <img src="https://ik.imagekit.io/24sfhkkep/shwe7ank-poster-16x9.png" alt="Join our Telegram" class="popup-poster">
        <h3>Join Our Telegram</h3>
        <p>Get the latest updates and exclusive content directly on Telegram.</p>
        <a href="https://t.me/+3sgGQcDP6ExhYTU1" target="_blank" class="join-btn">Join Now</a>
    </div>
  </div>

  <script>
document.addEventListener('DOMContentLoaded', async () => {

const PLAYLIST_URL = "https://allinonereborn.store/jiotv-m3u/playlist789.m3u8";

function getChannelId(){
  const p = new URLSearchParams(location.search);
  return p.get("id");
}

function showError(msg){
  document.getElementById("loadingMessage").style.display="none";
  document.getElementById("errorText").innerText = msg;
  document.getElementById("errorMessage").classList.remove("hidden");
}

function fixCDN(url){
  if(!url) return url;

  return url
  .replace("jiotvmblive.cdn.jio.com","jiotvbpkmob.cdn.jio.com")
  .replace("jiotv-live.cdn.jio.com","jiotvbpkmob.cdn.jio.com");
}

async function fetchChannel(){

const channelId = getChannelId();

if(!channelId){
showError("Channel ID missing");
return null;
}

try{

const res = await fetch(PLAYLIST_URL);
const text = await res.text();

const lines = text.split(/\r?\n/).map(l => l.trim());

let channel = null;
let temp = {};

for(let i=0;i<lines.length;i++){

const line = lines[i].trim();

if(line.startsWith("#EXTINF:")){

const idMatch = line.match(/tvg-id="([^"]+)"/);
const logoMatch = line.match(/tvg-logo="([^"]+)"/);
const name = line.split(",").pop();

temp = {
id: idMatch?.[1],
logo: logoMatch?.[1],
name: name,
keyId:null,
key:null,
cookie:null,
streamUrl:null
};

}

else if(line.startsWith("#KODIPROP:inputstream.adaptive.license_key=")){

const k = line.split("license_key=")[1];
const parts = k.split(":");

temp.keyId = parts[0];
temp.key = parts[1];

}

else if(line.startsWith("#EXTHTTP:")){

try{
const jsonMatch = line.match(/\{.*\}/);
if(jsonMatch){
const json = JSON.parse(jsonMatch[0]);
temp.cookie = json.cookie;
}
}catch(e){}

}

else if(line.startsWith("http")){

temp.streamUrl = fixCDN(line);

if(temp.id == channelId){
channel = {...temp};
break;
}

temp = {};

}

}

if(!channel){
showError("Channel not found");
return null;
}

return channel;

}catch(e){

showError("Playlist load failed");
return null;

}

}

async function startPlayer(channel){

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
showError("Browser not supported");
return;
}

const video = document.querySelector("video");
const player = new shaka.Player(video);

document.getElementById("channelLogo").src = channel.logo;
document.getElementById("channelName").innerText = channel.name;
document.getElementById("channelInfo").classList.remove("hidden");

if(channel.keyId && channel.key){

player.configure({
drm:{
clearKeys:{
[channel.keyId]:channel.key
}
}
});

}

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"] = "https://www.jiotv.com/";
request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13)";

if(channel.cookie){
request.headers["cookie"] = channel.cookie;
}

});

try{

await player.load(channel.streamUrl,0,"application/dash+xml");

document.getElementById("loadingMessage").style.display="none";

video.play().catch(()=>{});

}catch(e){

showError("Stream failed to load");

}

}

const channel = await fetchChannel();

if(channel){
startPlayer(channel);
}

});
</script>
</body>
</html>
