<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>SHWE7ANK+ Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  background:#000;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:system-ui,sans-serif;
}

.shaka-video-container{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* Channel info overlay (top bar) */
.channel-info{
  position:absolute;
  top:0;left:0;right:0;
  padding:12px 15px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
  display:flex;
  align-items:center;
  z-index:10;
  pointer-events:none;
}

.channel-logo{
  width:38px;
  height:38px;
  border-radius:8px;
  margin-right:10px;
  object-fit:contain;
  background:#111;
}

.channel-name{
  color:#fff;
  font-size:17px;
  font-weight:600;
}

/* Status / debug bar */
#status{
  position:absolute;
  top:10px;right:10px;
  z-index:50;
  color:#00ff88;
  background:rgba(0,0,0,.7);
  padding:4px 10px;
  font-size:12px;
  border-radius:4px;
  font-family:monospace;
  pointer-events:none;
  transition:opacity .4s;
}

#status.error{ color:#ff4444; }

/* Watermark */
.watermark{
  position:absolute;
  bottom:60px;left:16px;
  z-index:9;
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.12);
  pointer-events:none;
  letter-spacing:.5px;
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">

  <!-- Channel name + logo at top -->
  <div class="channel-info">
    <img id="channelLogo" class="channel-logo"
         onerror="this.style.display='none'">
    <div id="channelName" class="channel-name"></div>
  </div>

  <!-- Status bar -->
  <div id="status">Initializing…</div>

  <!-- Video element -->
  <video id="video" autoplay playsinline preload="metadata"></video>

  <!-- Watermark -->
  <div class="watermark">SHWE7ANK+</div>

</div>

<script>

/* ──────────────────────────────────────────
   CONFIGURATION
────────────────────────────────────────── */
const CHANNELS_URL   = "https://raw.githubusercontent.com/Shubhamkur/json/refs/heads/main/jiohd";
const COOKIE_PRIMARY  = "https://binge-jiotv.pages.dev/data/cookies.json";
const COOKIE_FALLBACK = "https://allrounder-live3.pages.dev/api/cookie.json";

/* ──────────────────────────────────────────
   STATUS HELPER
────────────────────────────────────────── */
const statusEl = document.getElementById("status");

function setStatus(msg, isError = false){
  statusEl.textContent = msg;
  statusEl.className = isError ? "error" : "";
  statusEl.style.opacity = "1";
  console[isError ? "error" : "log"]((isError ? "ERR: " : "INF: ") + msg);

  if(!isError){
    setTimeout(() => { statusEl.style.opacity = "0"; }, 4000);
  }
}

/* ──────────────────────────────────────────
   COOKIE EXTRACTOR
   1) Try PRIMARY → array, find item with .cookie
   2) If empty/failed → try FALLBACK → root object .cookie
────────────────────────────────────────── */
async function fetchCookie(){
  /* — Primary — */
  try{
    setStatus("Fetching cookie (primary)…");
    const res  = await fetch(COOKIE_PRIMARY);
    const data = await res.json();
    const entry = Array.isArray(data) ? data.find(i => i.cookie) : null;
    if(entry && entry.cookie) return entry.cookie;
  }catch(err){
    console.warn("Primary cookie failed:", err);
  }

  /* — Fallback — */
  try{
    setStatus("Primary cookie failed, trying fallback…", true);
    const res  = await fetch(COOKIE_FALLBACK);
    const data = await res.json();
    if(data && data.cookie) return data.cookie;
  }catch(err){
    console.warn("Fallback cookie failed:", err);
  }

  return "";
}

/* ──────────────────────────────────────────
   MAIN INIT
────────────────────────────────────────── */
document.addEventListener("DOMContentLoaded", async () => {

  /* 1 ─ Get channel id from URL */
  const channelId = new URLSearchParams(location.search).get("id");
  if(!channelId){
    setStatus("No channel ID in URL!", true);
    return;
  }

  /* 2 ─ Fetch channel list and find this channel */
  setStatus("Fetching channel data…");
  let channel;
  try{
    const res  = await fetch(CHANNELS_URL);
    const list = await res.json();
    channel = list.find(c => String(c.id) === String(channelId));
  }catch(e){
    setStatus("Failed to fetch channel list!", true);
    return;
  }

  if(!channel){
    setStatus("Channel ID " + channelId + " not found!", true);
    return;
  }

  /* 3 ─ Show channel info */
  document.getElementById("channelLogo").src = channel.logo || "";
  document.getElementById("channelName").textContent = channel.name || "";

  /* 4 ─ Build ordered stream URL list (url1 → url2 → url3) */
  const streamUrls = [channel.url1, channel.url2, channel.url3]
    .filter(Boolean)
    .map(u => u.replace('bpk-tv//', 'bpk-tv/'));
  if(streamUrls.length === 0){
    setStatus("No stream URLs found for this channel!", true);
    return;
  }

  /* 5 ─ Fetch auth cookie */
  const cookie = await fetchCookie();
  if(!cookie) console.warn("No cookie obtained – stream may fail if CDN requires auth.");

  /* 6 ─ Init Shaka Player */
  shaka.polyfill.installAll();
  if(!shaka.Player.isBrowserSupported()){
    setStatus("Browser not supported by Shaka!", true);
    return;
  }

  const videoEl    = document.getElementById("video");
  const container  = document.getElementById("player-container");

  const player = new shaka.Player();
  await player.attach(videoEl);

  /* UI controls */
  const ui = new shaka.ui.Overlay(player, container, videoEl);
  ui.configure({
    controlPanelElements:[
      "play_pause","time_and_duration","spacer",
      "language","picture_in_picture","quality","fullscreen"
    ],
    seekBarColors:{
      base:"rgba(255,255,255,0.3)",
      buffered:"rgba(255,255,255,0.6)",
      played:"#3b82f6"
    }
  });

  /* DRM + streaming config */
  player.configure({
    drm:{
      clearKeys:{ [channel.keyId]: channel.key }
    },
    manifest:{
      defaultPresentationDelay: 5
    },
    streaming:{
      bufferingGoal:      20,
      rebufferingGoal:    3,
      safeSeekOffset:     5,
      lowLatencyMode:     true,
      retryParameters:{
        maxAttempts: 4,
        baseDelay:   500
      }
    }
  });

  /* Network filter:
     - Inject JioTV headers on every request
     - Append cookie token as query param on MANIFEST + SEGMENT requests */
  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"]    = "https://www.jiotv.com/";
    request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

    if(
      cookie &&
      (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
       type === shaka.net.NetworkingEngine.RequestType.SEGMENT)
    ){
      /* Strip any existing query so cookie is always clean */
      const cleanUrl = request.uris[0].split("?")[0];
      request.uris[0] = cleanUrl + "?" + cookie;
    }
  });

  /* 7 ─ Try each stream URL in order */
  let loaded = false;

  for(let i = 0; i < streamUrls.length; i++){
    const url = streamUrls[i];
    setStatus(`Trying URL ${i + 1} of ${streamUrls.length}…`);

    try{
      await player.load(url);
      videoEl.play();
      loaded = true;
      setStatus("▶ Playing – " + channel.name);
      break;
    }catch(err){
      console.warn(`URL ${i + 1} failed:`, err);
      setStatus(`URL ${i + 1} failed, trying next…`, true);
    }
  }

  if(!loaded){
    setStatus("All stream URLs failed. Check DRM keys or cookie expiry.", true);
  }

});
</script>

</body>
</html>
