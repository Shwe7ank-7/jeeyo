<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;height:100vh;width:100vw;overflow:hidden;font-family:system-ui}

.shaka-video-container{position:absolute;inset:0;width:100%;height:100%}
video{width:100%;height:100%;object-fit:contain;background:#000}

.channel-info{
position:absolute;
top:0;
left:0;
right:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);
padding:1rem;
display:flex;
align-items:center;
z-index:10;
}

.channel-logo{
width:40px;
height:40px;
margin-right:15px;
border-radius:8px;
background:#222
}

.channel-name{color:#fff;font-size:1.2rem}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#fff;
font-size:1.2rem
}

.error{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#ff4444;
font-size:1.2rem;
text-align:center;
background:rgba(0,0,0,0.7);
padding:2rem;
border-radius:8px;
}

.popup-container{
display:none;
position:fixed;
z-index:9999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popup-content{
background:#fff;
padding:20px;
border-radius:15px;
max-width:400px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
margin:0 20px;
}

.popup-poster{width:100%;border-radius:10px;margin-bottom:15px}

.close-btn{
position:absolute;
top:12px;
right:12px;
font-size:28px;
font-weight:bold;
color:#000;
background:#fff;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.join-btn{
display:inline-block;
background:#0088cc;
color:#fff;
padding:10px 25px;
text-decoration:none;
border-radius:25px;
font-weight:bold;
margin-top:10px
}
</style>
</head>

<body>

<div class="channel-info" id="channelInfo">
<img class="channel-logo" id="channelLogo">
<div class="channel-name" id="channelName">Loading Channel...</div>
</div>

<div class="shaka-video-container" data-shaka-player>
<video autoplay playsinline></video>
</div>

<div class="loading" id="loadingMessage">Loading channel...</div>

<div class="error" id="errorMessage" style="display:none">
<h2>Error Loading Channel</h2>
<p id="errorText"></p>
</div>

<div id="telegram-popup" class="popup-container">
<div class="popup-content">
<span class="close-btn" onclick="closePopup()">&times;</span>
<img src="https://ik.imagekit.io/24sfhkkep/shwe7ank-poster-16x9.png" class="popup-poster">
<h3>Join Our Telegram</h3>
<p>Get the latest updates and exclusive content.</p>
<a href="https://t.me/+3sgGQcDP6ExhYTU1" target="_blank" class="join-btn">Join Now</a>
</div>
</div>

<script>

const API_URL="https://allrounderid2.pages.dev/api/jiotv2.json"

const video=document.querySelector("video")
const loadingMessage=document.getElementById("loadingMessage")

function showError(msg){
document.getElementById("errorText").innerText=msg
document.getElementById("errorMessage").style.display="block"
loadingMessage.style.display="none"
}

function getChannelId(){
const url=new URLSearchParams(window.location.search)
return url.get("id")
}

async function fetchChannel(){

const id=getChannelId()

if(!id){
showError("No channel id provided")
return null
}

const res=await fetch(API_URL)
const data=await res.json()

const channel=data.find(c=>c.channel_id===id)

if(!channel){
showError("Channel not found")
return null
}

return channel
}

async function startPlayer(channel){

shaka.polyfill.installAll()

if(!shaka.Player.isBrowserSupported()){
showError("Browser not supported")
return
}

const player=new shaka.Player(video)

const container=document.querySelector(".shaka-video-container")
new shaka.ui.Overlay(player,container,video)

player.configure({
drm:{
clearKeys:{
[channel.keyId]:channel.key
}
}
})

try{

await player.load(channel.channel_url)

document.getElementById("channelLogo").src=channel.channel_logo
document.getElementById("channelName").innerText=channel.channel_name

loadingMessage.style.display="none"

}catch(e){
showError("Stream failed to load")
console.error(e)
}

}

document.addEventListener("DOMContentLoaded",async()=>{

const channel=await fetchChannel()

if(channel){
startPlayer(channel)
}

})

setTimeout(()=>{
document.getElementById("telegram-popup").style.display="flex"
},3000)

function closePopup(){
document.getElementById("telegram-popup").style.display="none"
}

</script>

</body>
</html>
