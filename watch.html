<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>SHWE7ANK+ Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  background:#000;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:system-ui,sans-serif;
}

/* ── TELEGRAM POPUP ── */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup-content {
  background: #FFD700;
  color: black;
  padding: 25px;
  text-align: center;
  border-radius: 12px;
  width: 360px;
  animation: moreRealisticBounce 0.6s ease-out;
  transform: perspective(1000px) rotateX(10deg) translateZ(20px);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
}

.popup-content h2 { margin: 0 0 12px; font-size: 24px; }
.popup-content p  { margin: 0 0 15px; font-size: 16px; }

.popup-content button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s ease-in-out;
  font-weight: bold;
}

.popup-content .join-btn  { background: black; color: #FFD700; }
.popup-content .close-btn { background: #555;  color: white;   }

@keyframes moreRealisticBounce {
  0%   { opacity: 0; transform: translateY(-60px) scale(0.9);  }
  40%  { opacity: 1; transform: translateY(15px)  scale(1.02); }
  70%  {             transform: translateY(-8px)  scale(0.98); }
  100% {             transform: translateY(0)     scale(1);    }
}

/* ── PLAYER ── */
.shaka-video-container{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

.channel-info{
  position:absolute;
  top:0;left:0;right:0;
  padding:12px 15px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
  display:flex;
  align-items:center;
  z-index:10;
  pointer-events:none;
}

.channel-logo{
  width:38px;
  height:38px;
  border-radius:8px;
  margin-right:10px;
  object-fit:contain;
  background:#111;
}

.channel-name{
  color:#fff;
  font-size:17px;
  font-weight:600;
}

#status{
  position:absolute;
  top:10px;right:10px;
  z-index:50;
  color:#00ff88;
  background:rgba(0,0,0,.7);
  padding:4px 10px;
  font-size:12px;
  border-radius:4px;
  font-family:monospace;
  pointer-events:none;
  transition:opacity .4s;
}

#status.error{ color:#ff4444; }

.watermark{
  position:absolute;
  bottom:60px;left:16px;
  z-index:9;
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.12);
  pointer-events:none;
  letter-spacing:.5px;
}
</style>
</head>

<body>

<!-- ── TELEGRAM POPUP ── -->
<div id="popup">
  <div class="popup-content">
    <h2>Support Us!</h2>
    <p>Join our Telegram channel for more updates.</p>
    <button class="join-btn" onclick="window.open('https://t.me/+3sgGQcDP6ExhYTU1','_blank')">Join Now</button>
    <button class="close-btn" onclick="closePopup()">Already Joined</button>
  </div>
</div>

<!-- ── PLAYER ── -->
<div class="shaka-video-container" id="player-container">

  <div class="channel-info">
    <img id="channelLogo" class="channel-logo" onerror="this.style.display='none'">
    <div id="channelName" class="channel-name"></div>
  </div>

  <div id="status">Initializing…</div>

  <video id="video" autoplay playsinline preload="metadata"></video>

  <div class="watermark">SHWE7ANK+</div>

</div>

<script>

/* ── POPUP ── */
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* ── CONFIGURATION ── */
const CHANNELS_URL = "https://binge-giotv.pages.dev/data/id.json";

/* ── STATUS ── */
const statusEl = document.getElementById("status");

function setStatus(msg, isError = false){
  statusEl.textContent   = msg;
  statusEl.className     = isError ? "error" : "";
  statusEl.style.opacity = "1";
  console[isError ? "error" : "log"]((isError ? "ERR: " : "INF: ") + msg);
  if(!isError){
    setTimeout(() => { if(statusEl.textContent === msg) statusEl.style.opacity = "0"; }, 4000);
  }
}

/* ── FETCH CONFIG ──
   JSON structure: { updatedAt, channels: [...] }
   Cookie is per-channel inside the JSON — no external fetch needed
─────────────────────────────────────────── */
async function fetchConfig(){
  try{
    setStatus("Fetching channel data…");
    const channelId = new URLSearchParams(location.search).get("id");

    const res  = await fetch(CHANNELS_URL);
    const data = await res.json();

    /* Support both plain array and { channels: [...] } wrapper */
    const channelList = Array.isArray(data) ? data : (data.channels || []);
    const channelData = channelList.find(c => String(c.id) === String(channelId));

    if(!channelData){
      setStatus("Channel ID " + channelId + " not found!", true);
      return null;
    }

    if(!channelData.url){
      setStatus("No stream URL for this channel!", true);
      return null;
    }

    const cookie = channelData.cookie || "";
    if(!cookie) console.warn("No cookie in channel data — stream may fail.");

    return { channelData, cookie };

  }catch(err){
    console.error("fetchConfig error:", err);
    setStatus("Critical Error: " + (err.message || err), true);
    return null;
  }
}

/* ── MAIN ── */
document.addEventListener("DOMContentLoaded", async () => {

  const cfg = await fetchConfig();
  if(!cfg) return;

  const { channelData, cookie } = cfg;

  document.getElementById("channelLogo").src         = channelData.logo || "";
  document.getElementById("channelName").textContent = channelData.name || "";

  shaka.polyfill.installAll();
  if(!shaka.Player.isBrowserSupported()){
    setStatus("Browser not supported!", true); return;
  }

  const videoEl   = document.getElementById("video");
  const container = document.getElementById("player-container");

  const player = new shaka.Player();
  await player.attach(videoEl);

  new shaka.ui.Overlay(player, container, videoEl).configure({
    controlPanelElements:[
      "play_pause","time_and_duration","spacer",
      "language","captions","picture_in_picture","quality","fullscreen"
    ],
    seekBarColors:{
      base:"rgba(255,255,255,0.3)",
      buffered:"rgba(255,255,255,0.6)",
      played:"#3b82f6"
    }
  });

  player.configure({
    drm:{ clearKeys:{ [channelData.keyId]: channelData.key } },
    manifest:{ defaultPresentationDelay: 5 },
    streaming:{ safeSeekOffset:5, bufferingGoal:10, rebufferingGoal:2, lowLatencyMode:true }
  });

  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"]    = "https://www.jiotv.com/";
    request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
    if(cookie &&
      (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
       type === shaka.net.NetworkingEngine.RequestType.SEGMENT)){
      request.uris[0] = request.uris[0].split("?")[0] + "?" + cookie;
    }
  });

  setStatus("Loading stream…");
  try{
    await player.load(channelData.url);
    videoEl.play();
    setStatus("▶ Playing – " + channelData.name);
  }catch(e){
    console.error("Stream failed:", e);
    setStatus("Stream failed to load. Cookie may be expired.", true);
  }

});
</script>

</body>
</html>
