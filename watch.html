<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>SHWE7ANK+ Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  background:#000;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:system-ui,sans-serif;
}

.shaka-video-container{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

/* Channel info overlay (top bar) */
.channel-info{
  position:absolute;
  top:0;left:0;right:0;
  padding:12px 15px;
  background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);
  display:flex;
  align-items:center;
  z-index:10;
  pointer-events:none;
}

.channel-logo{
  width:38px;
  height:38px;
  border-radius:8px;
  margin-right:10px;
  object-fit:contain;
  background:#111;
}

.channel-name{
  color:#fff;
  font-size:17px;
  font-weight:600;
}

/* Status / debug bar */
#status{
  position:absolute;
  top:10px;right:10px;
  z-index:50;
  color:#00ff88;
  background:rgba(0,0,0,.7);
  padding:4px 10px;
  font-size:12px;
  border-radius:4px;
  font-family:monospace;
  pointer-events:none;
  transition:opacity .4s;
}

#status.error{ color:#ff4444; }

/* Watermark */
.watermark{
  position:absolute;
  bottom:60px;left:16px;
  z-index:9;
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,.12);
  pointer-events:none;
  letter-spacing:.5px;
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">

  <!-- Channel name + logo at top -->
  <div class="channel-info">
    <img id="channelLogo" class="channel-logo"
         onerror="this.style.display='none'">
    <div id="channelName" class="channel-name"></div>
  </div>

  <!-- Status bar -->
  <div id="status">Initializing…</div>

  <!-- Video element -->
  <video id="video" autoplay playsinline preload="metadata"></video>

  <!-- Watermark -->
  <div class="watermark">SHWE7ANK+</div>

</div>

<script>

/* ── CONFIGURATION ── */
const CHANNELS_URL    = "https://raw.githubusercontent.com/Shubhamkur/json/refs/heads/main/jiohd";
const COOKIE_PRIMARY  = "https://jiotv-cookies.odfinity.workers.dev/data/cookies.json";
const COOKIE_FALLBACK = "https://allrounder-live3.pages.dev/api/cookie.json";

/* ── STATUS ── */
const statusEl = document.getElementById("status");

function setStatus(msg, isError = false){
  statusEl.textContent   = msg;
  statusEl.className     = isError ? "error" : "";
  statusEl.style.opacity = "1";
  console[isError ? "error" : "log"]((isError ? "ERR: " : "INF: ") + msg);
  if(!isError){
    setTimeout(() => { if(statusEl.textContent === msg) statusEl.style.opacity = "0"; }, 4000);
  }
}

/* ── FETCH CONFIG (sequential, robust) ── */
async function fetchConfig(){
  try{

    /* 1. Channel JSON — fetch as text, wrap in [] if not already an array */
    setStatus("Fetching channel data…");
    const channelRes  = await fetch(CHANNELS_URL);
    const channelText = await channelRes.text();
    const channelJson = channelText.trim().startsWith('[') ? channelText : '[' + channelText + ']';
    const channelList = JSON.parse(channelJson);

    const channelId   = new URLSearchParams(location.search).get("id");
    const channelData = channelList.find(c => String(c.id) === String(channelId));

    if(!channelData){
      setStatus("Channel ID " + channelId + " not found!", true);
      return null;
    }

    /* 2. Primary cookie → array: find first item with .cookie */
    let primaryCookie = "", fallbackCookie = "";
    try{
      setStatus("Fetching cookie (primary)…");
      const res  = await fetch(COOKIE_PRIMARY);
      const data = await res.json();
      const entry = Array.isArray(data) ? data.find(i => i.cookie) : null;
      if(entry && entry.cookie) primaryCookie = entry.cookie;
    }catch(e){ console.warn("Primary cookie failed:", e); }

    /* 3. Fallback cookie → root object: { cookie: "..." } */
    try{
      const res  = await fetch(COOKIE_FALLBACK);
      const data = await res.json();
      if(data && data.cookie) fallbackCookie = data.cookie;
    }catch(e){ console.warn("Fallback cookie failed:", e); }

    /* Promote fallback if primary empty */
    if(!primaryCookie){
      primaryCookie  = fallbackCookie;
      fallbackCookie = "";
    }

    /* 4. Stream URLs: url → url1 → url2 → url3, fix double-slash */
    const streamUrls = [channelData.url, channelData.url1, channelData.url2, channelData.url3]
      .filter(Boolean)
      .map(u => u.replace('bpk-tv//', 'bpk-tv/'));

    if(streamUrls.length === 0){
      setStatus("No stream URLs found!", true);
      return null;
    }

    return { channelData, streamUrls, primaryCookie, fallbackCookie };

  }catch(err){
    console.error("fetchConfig error:", err);
    setStatus("Critical Error: " + (err.message || err), true);
    return null;
  }
}

/* ── MAIN ── */
document.addEventListener("DOMContentLoaded", async () => {

  const cfg = await fetchConfig();
  if(!cfg) return;

  const { channelData, streamUrls, primaryCookie, fallbackCookie } = cfg;

  /* Show channel info */
  document.getElementById("channelLogo").src         = channelData.logo || "";
  document.getElementById("channelName").textContent = channelData.name || "";

  /* Shaka init */
  shaka.polyfill.installAll();
  if(!shaka.Player.isBrowserSupported()){
    setStatus("Browser not supported!", true); return;
  }

  const videoEl   = document.getElementById("video");
  const container = document.getElementById("player-container");

  const player = new shaka.Player();
  await player.attach(videoEl);

  new shaka.ui.Overlay(player, container, videoEl).configure({
    controlPanelElements:["play_pause","time_and_duration","spacer","language","captions","picture_in_picture","quality","fullscreen"],
    seekBarColors:{ base:"rgba(255,255,255,0.3)", buffered:"rgba(255,255,255,0.6)", played:"#3b82f6" }
  });

  player.configure({
    drm:{ clearKeys:{ [channelData.keyId]: channelData.key } },
    manifest:{ defaultPresentationDelay: 5 },
    streaming:{ safeSeekOffset:5, bufferingGoal:10, rebufferingGoal:2, lowLatencyMode:true }
  });

  /* activeCookie is mutated per cookie round */
  let activeCookie = primaryCookie;

  player.getNetworkingEngine().registerRequestFilter((type, request) => {
    request.headers["Referer"]    = "https://www.jiotv.com/";
    request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
    if(activeCookie &&
      (type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||
       type === shaka.net.NetworkingEngine.RequestType.SEGMENT)){
      request.uris[0] = request.uris[0].split("?")[0] + "?" + activeCookie;
    }
  });

  /* Cookie rounds × URL double-loop */
  const cookieRounds = [primaryCookie];
  if(fallbackCookie && fallbackCookie !== primaryCookie) cookieRounds.push(fallbackCookie);

  let loaded = false;

  outer:
  for(let r = 0; r < cookieRounds.length; r++){
    activeCookie    = cookieRounds[r];
    const label     = r === 0 ? "primary" : "fallback";

    for(let i = 0; i < streamUrls.length; i++){
      setStatus(`[${label} cookie] Trying URL ${i+1} of ${streamUrls.length}…`);
      try{
        await player.load(streamUrls[i]);
        videoEl.play();
        loaded = true;
        setStatus("▶ Playing – " + channelData.name);
        break outer;
      }catch(e){
        console.warn(`[${label}] URL ${i+1} failed:`, e);
        setStatus(`[${label}] URL ${i+1} failed, trying next…`, true);
      }
    }

    if(!loaded && r < cookieRounds.length - 1)
      setStatus("All URLs failed with primary cookie, retrying with fallback…", true);
  }

  if(!loaded){
    setStatus("All stream URLs failed. Check DRM keys or cookie expiry.", true);
  }

});
</script>

</body>
</html>
