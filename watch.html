<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>
html,body{
margin:0;
background:#000;
height:100%;
}

video{
width:100%;
height:100%;
object-fit:contain;
}

.channel-info{
position:absolute;
top:0;
left:0;
right:0;
padding:12px;
display:flex;
align-items:center;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
z-index:10;
}

.channel-logo{
width:40px;
height:40px;
margin-right:10px;
}

.channel-name{
color:white;
font-size:16px;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
}
</style>
</head>

<body>

<div class="channel-info" id="channelInfo">
<img id="channelLogo" class="channel-logo">
<div id="channelName" class="channel-name"></div>
</div>

<video autoplay playsinline></video>

<div class="loading" id="loadingMessage">Loading stream...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const PLAYLIST_URL="https://allinonereborn.store/jiotv-m3u/playlist789.m3u8";

function showError(msg){
document.getElementById("loadingMessage").innerText=msg;
}

/* CDN FIX */
function fixCDN(url){

if(!url) return url;

return url
.replace("jiotvmblive.cdn.jio.com","jiotvbpkmob.cdn.jio.com")
.replace("jiotv-live.cdn.jio.com","jiotvbpkmob.cdn.jio.com");

}

async function fetchChannel(){

const params=new URLSearchParams(location.search);
const channelId=params.get("id");

if(!channelId){
showError("Channel ID missing");
return null;
}

try{

const res=await fetch(PLAYLIST_URL);
const text=await res.text();

const lines=text.split(/\r?\n/);

let channel={};

for(let i=0;i<lines.length;i++){

const line=lines[i].trim();

if(line.includes('tvg-id="'+channelId+'"')){

const name=line.split(",").pop();
const logo=line.match(/tvg-logo="([^"]+)"/)?.[1];

const keyLine=lines[i+2]?.trim();
const cookieLine=lines[i+4]?.trim();
const streamLine=lines[i+5]?.trim();

const keyMatch=keyLine.match(/license_key=([^:]+):(.+)/);
const cookieMatch=cookieLine.match(/"cookie":"([^"]+)"/);

channel={
name:name,
logo:logo,
keyId:keyMatch?.[1],
key:keyMatch?.[2],
cookie:cookieMatch?.[1],
streamUrl:fixCDN(streamLine?.trim())
};

break;

}

}

if(!channel.streamUrl){
showError("Channel not found");
return null;
}

return channel;

}catch(e){

showError("Playlist load failed");
return null;

}

}

async function startPlayer(channel){

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
showError("Browser not supported");
return;
}

const video=document.querySelector("video");
const player=new shaka.Player(video);

document.getElementById("channelLogo").src=channel.logo;
document.getElementById("channelName").innerText=channel.name;

player.configure({
drm:{
clearKeys:{
[channel.keyId]:channel.key
}
}
});

player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13)";

if(channel.cookie){
request.headers["cookie"]=channel.cookie;
}

});

try{

await player.load(channel.streamUrl, 0, "application/dash+xml");

document.getElementById("loadingMessage").style.display="none";

video.play().catch(()=>{});

}catch(e){

showError("Stream failed to load");

}

}

const channel=await fetchChannel();

if(channel){
startPlayer(channel);
}

});
</script>

</body>
</html>
