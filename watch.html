<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioTV Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
background:#000;
height:100vh;
width:100vw;
overflow:hidden;
font-family:system-ui;
}

.shaka-video-container{
position:absolute;
inset:0;
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}

.channel-info{
position:absolute;
top:0;
left:0;
right:0;
padding:15px;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
display:flex;
align-items:center;
z-index:10;
}

.channel-logo{
width:40px;
height:40px;
border-radius:8px;
margin-right:12px;
}

.channel-name{
color:#fff;
font-size:18px;
font-weight:600;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:18px;
}

.error{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#ff4444;
background:rgba(0,0,0,.8);
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="channel-info">
<img id="channelLogo" class="channel-logo">
<div id="channelName" class="channel-name"></div>
</div>

<div class="shaka-video-container" data-shaka-player>
<video autoplay playsinline></video>
</div>

<div id="loading" class="loading">Loading Channel...</div>
<div id="error" class="error" style="display:none"></div>

<script>

const API="https://pkll.xojiv79335.workers.dev/";

function getId(){
 return new URLSearchParams(location.search).get("id");
}

async function fetchChannel(){

 const id=getId();
 if(!id){
  showError("Channel ID missing");
  return null;
 }

 const res=await fetch(API);
 const data=await res.json();

 return data.find(c=>c.channel_id==id);
}

function showError(msg){
 document.getElementById("loading").style.display="none";
 const err=document.getElementById("error");
 err.innerText=msg;
 err.style.display="block";
}

async function startPlayer(channel){

 shaka.polyfill.installAll();

 if(!shaka.Player.isBrowserSupported()){
  showError("Browser not supported");
  return;
 }

 const video=document.querySelector("video");

 const player=new shaka.Player(video);

 const container=document.querySelector(".shaka-video-container");

 new shaka.ui.Overlay(player,container,video);

 /* DRM */

 player.configure({
  drm:{
   clearKeys:{
    [channel.keyId]:channel.key
   }
  },
  streaming: {
            lowLatencyMode: true,
            bufferingGoal: 15,
            rebufferingGoal: 2,
            bufferBehind: 15,
            retryParameters: {
              timeout: 10000,
              maxAttempts: 5,
              baseDelay: 300,
              backoffFactor: 1.2
            },
            segmentRequestTimeout: 8000,
            segmentPrefetchLimit: 2,
            useNativeHlsOnSafari: true
          },
          manifest: {
            retryParameters: {
              timeout: 8000,
              maxAttempts: 3
            }
          }
        });

 /* NETWORK FILTER */

 const cookie=channel.cookie;

 player.getNetworkingEngine().registerRequestFilter((type,request)=>{

  request.headers["Referer"]="https://www.jiotv.com/";
  request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";

  if(cookie){
   request.headers["Cookie"]=cookie;
  }

  /* append cookie token to segments */

  if(
   cookie &&
   (type===shaka.net.NetworkingEngine.RequestType.SEGMENT ||
    type===shaka.net.NetworkingEngine.RequestType.MANIFEST)
  ){

   if(!request.uris[0].includes("__hdnea__")){

    const sep=request.uris[0].includes("?") ? "&" : "?";
    request.uris[0]+=sep+cookie;

   }

  }

 });

 try{

  await player.load(channel.channel_url);

  document.getElementById("loading").style.display="none";

  video.play();

 }catch(e){

  console.error(e);
  showError("Stream failed to start");

 }

}

async function init(){

 const channel=await fetchChannel();

 if(!channel){
  showError("Channel not found");
  return;
 }

 document.getElementById("channelLogo").src=channel.channel_logo;
 document.getElementById("channelName").innerText=channel.channel_name;

 startPlayer(channel);

}

init();

</script>

</body>
</html>
