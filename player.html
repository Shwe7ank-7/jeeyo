<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css">

<style>
html,body{
margin:0;
background:#000;
height:100%;
}

.shaka-video-container{
position:absolute;
inset:0;
width:100%;
height:100%;
}

video{
width:100%;
height:100%;
object-fit:contain;
background:#000;
}
</style>
</head>

<body>

<div class="shaka-video-container" data-shaka-player>
<video autoplay playsinline></video>
</div>

<script>
document.addEventListener("DOMContentLoaded", async ()=>{

const JSON_URL="https://raw.githubusercontent.com/Shwe7ank-7/jeeyo/main/channels.json";

const id=new URLSearchParams(location.search).get("id");

if(!id){
alert("Channel ID missing");
return;
}

const res=await fetch(JSON_URL);
const channels=await res.json();

const channel=channels.find(c=>String(c.id)===String(id));

if(!channel){
alert("Channel not found");
return;
}

let streamUrl=channel.mpd;
let cookieHeader=channel.cookie;

/* append cookie to MPD URL */
if(cookieHeader && !streamUrl.includes("hdnea")){
const sep=streamUrl.includes("?")?"&":"?";
streamUrl+=sep+cookieHeader;
}

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
alert("Browser not supported");
return;
}

const video=document.querySelector("video");

const player=new shaka.Player(video);

const container=document.querySelector(".shaka-video-container");
const ui=new shaka.ui.Overlay(player,container,video);

ui.configure({
controlPanelElements:[
"play_pause",
"time_and_duration",
"mute",
"volume",
"spacer",
"quality",
"fullscreen"
]
});

player.configure({
drm:{
clearKeys:{
[channel.keyId]:channel.key
}
}
});

/* networking headers */
player.getNetworkingEngine().registerRequestFilter((type,request)=>{

request.headers["Referer"]="https://www.jiotv.com/";
request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13)";
request.headers["Cookie"]=cookieHeader;

});

/* load stream */

try{

await player.load(streamUrl);

video.play();

}catch(e){

console.log(e);
alert("Stream failed");

}

});
</script>

</body>
</html>
