<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>

<style>
body{
margin:0;
background:#000;
}

video{
width:100vw;
height:100vh;
object-fit:contain;
background:black;
}

.info{
position:absolute;
top:0;
left:0;
right:0;
padding:10px;
display:flex;
align-items:center;
background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
color:white;
font-family:sans-serif;
}

.info img{
width:40px;
margin-right:10px;
}
</style>
</head>

<body>

<div class="info">
<img id="logo">
<div id="name"></div>
</div>

<video autoplay playsinline></video>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const JSON_URL = "https://raw.githubusercontent.com/Shwe7ank-7/jeeyo/main/channels.json";

function getChannelId(){
  const params = new URLSearchParams(location.search);
  return params.get("id");
}

function showError(msg){
  alert(msg);
}

async function fetchChannel(){

  const id = getChannelId();

  if(!id){
    showError("Channel ID missing");
    return null;
  }

  try{

    const res = await fetch(JSON_URL);
    const data = await res.json();

    const channel = data.find(c => String(c.id) === String(id));

    if(!channel){
      showError("Channel not found");
      return null;
    }

    return channel;

  }catch(e){
    showError("Failed to load JSON");
    return null;
  }
}

async function startPlayer(channel){

shaka.polyfill.installAll();

if(!shaka.Player.isBrowserSupported()){
showError("Browser not supported");
return;
}

const video = document.querySelector("video");
const player = new shaka.Player(video);

document.getElementById("channelLogo").src = channel.logo;
document.getElementById("channelName").innerText = channel.name;
document.getElementById("channelInfo").classList.remove("hidden");

player.configure({
drm:{
clearKeys:{
[channel.keyId]:channel.key
}
}
});

player.getNetworkingEngine().registerRequestFilter((type, request)=>{

request.headers["Referer"] = "https://www.jiotv.com/";
request.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13)";

if(channel.cookie){
request.headers["Cookie"] = channel.cookie;
}

});

try{

await player.load(channel.mpd);

document.getElementById("loadingMessage").style.display="none";

video.play().catch(()=>{});

}catch(e){

showError("Stream failed to load");

}

}

const channel = await fetchChannel();

if(channel){
startPlayer(channel);
}

});
</script>

</body>
</html>
