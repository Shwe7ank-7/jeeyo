<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SHWE7ANK JIOTV+</title><style>

:root{
--bg-primary:#0f172a;
--bg-secondary:#1e293b;
--text-primary:#f8fafc;
--accent:#3b82f6;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg-primary);
color:white;
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:50;
background:var(--bg-secondary);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:800;
font-size:18px;
}

/* SEARCH */

.search-container{
padding:15px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #334155;
background:var(--bg-secondary);
color:white;
}

/* CATEGORY SLIDER */

#categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 15px;
scrollbar-width:none;
}

#categories::-webkit-scrollbar{
display:none;
}

.category{
background:var(--bg-secondary);
padding:8px 14px;
border-radius:20px;
font-size:13px;
cursor:pointer;
white-space:nowrap;
}

.category.active{
background:var(--accent);
}

/* GRID */

#grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:12px;
padding:15px;
}

.card{
background:var(--bg-secondary);
border-radius:10px;
cursor:pointer;
overflow:hidden;
}

.card img{
width:100%;
aspect-ratio:16/9;
object-fit:contain;
background:black;
}

.card-info{
padding:8px;
text-align:center;
font-size:11px;
}

#loader{
text-align:center;
padding:20px;
color:#aaa;
}
<meta name="monetag" content="b03b8da6852c019d33a6aff7f6f67028">
</style><script src="https://semicolondriverelevated.com/1d/6a/57/1d6a575d756ceeb65888fb8b7328a1e6.js"></script></head><body><header>
<div class="logo">SHWE7ANK+</div>
<div onclick="location.reload()">↻</div>
</header><div class="search-container">
<input id="search" placeholder="Search Channels..." oninput="filterChannels()">
</div><div id="categories"></div><div id="loader">Loading Channels...</div>
<div id="grid"></div><script>

const PLAYLIST_URL="https://allinonereborn.store/jiotv-m3u/playlist789.m3u8";

let allChannels=[];
let currentCategory="All";

window.onload=loadPlaylist;

async function loadPlaylist(){

try{

const res=await fetch(PLAYLIST_URL);
const text=await res.text();

parseM3U(text);

}catch(e){

document.getElementById("loader").innerText="Failed to load playlist";

}

}

function parseM3U(data){

const lines=data.split("\n");

let current={};

lines.forEach(line=>{

line=line.trim();

if(line.startsWith("#EXTINF")){

const id=line.match(/tvg-id="([^"]+)"/)?.[1];
const logo=line.match(/tvg-logo="([^"]+)"/)?.[1];
const group=line.match(/group-title="([^"]+)"/)?.[1];
const name=line.split(",").pop();

current={
id:id,
name:name,
logo:logo,
group:group || "Other"
};

}

else if(line.startsWith("http")){

if(current.id){
allChannels.push({...current});
}

current={};

}

});

document.getElementById("loader").style.display="none";

buildCategories();

renderChannels(allChannels);

}

/* CATEGORY BUILD */

function buildCategories(){

const categories=["All"];

allChannels.forEach(c=>{
if(!categories.includes(c.group)){
categories.push(c.group);
}
});

const container=document.getElementById("categories");

categories.forEach(cat=>{

const el=document.createElement("div");

el.className="category";

if(cat==="All") el.classList.add("active");

el.textContent=cat;

el.onclick=()=>{

document.querySelectorAll(".category").forEach(x=>x.classList.remove("active"));
el.classList.add("active");

currentCategory=cat;

filterChannels();

};

container.appendChild(el);

});

}

/* RENDER CHANNELS */

function renderChannels(list){

const grid=document.getElementById("grid");

grid.innerHTML="";

list.forEach(c=>{

const card=document.createElement("div");

card.className="card";

card.onclick=()=>location.href=`watch.html?id=${c.id}`;

card.innerHTML=`
<img src="${c.logo}" loading="lazy">
<div class="card-info">${c.name}</div>
`;

grid.appendChild(card);

});

}

/* SEARCH + CATEGORY FILTER */

function filterChannels(){

const q=document.getElementById("search").value.toLowerCase();

let filtered=allChannels.filter(c=>c.name.toLowerCase().includes(q));

if(currentCategory!=="All"){
filtered=filtered.filter(c=>c.group===currentCategory);
}

renderChannels(filtered);

}

</script></body>
</html>
